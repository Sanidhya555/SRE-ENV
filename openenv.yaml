name: sre_env
version: "1.0.0"
description: >
  SRE Incident Response Environment — an OpenEnv-spec training ground
  where an AI agent practices diagnosing and fixing production incidents
  in a simulated 6-service microservices company.
author: openenv-community
tags:
  - openenv
  - sre
  - incident-response
  - devops
  - real-world

environment:
  reset_endpoint:   /reset
  step_endpoint:    /step
  state_endpoint:   /state
  ws_endpoint:      /ws
  health_endpoint:  /health

  action_type:      SREAction
  observation_type: SREObservation
  state_type:       SREState

tasks:
  - id: 1
    name: memory_leak
    difficulty: easy
    description: "order-service repeatedly crashing due to OOM memory leak"

  - id: 2
    name: cascading_failure
    difficulty: medium
    description: "Slow checkout caused by a bad DB query in a recent deployment"

  - id: 3
    name: red_herring_storm
    difficulty: hard
    description: "Multiple simultaneous alerts — 2 fake, 1 real hidden feature flag issue"

reward:
  min: 0.0
  max: 1.0
  partial_progress: true

episode:
  max_steps: 20
  termination: close_incident or max_steps